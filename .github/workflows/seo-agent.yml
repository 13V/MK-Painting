name: SEO Agent — Daily Report

on:
  schedule:
    - cron: "0 0 * * *"  # 00:00 UTC = 9:30 AM ACST (Adelaide morning)
  workflow_dispatch:       # Manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write

jobs:
  seo-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: seo-agent/requirements.txt

      - name: Install dependencies
        run: pip install -r seo-agent/requirements.txt

      - name: Configure git
        run: |
          git config user.name "MK Painting SEO Agent"
          git config user.email "seo-agent@mandkpaintingservices.com.au"

      - name: Run SEO Agent
        id: agent
        working-directory: seo-agent
        continue-on-error: true
        timeout-minutes: 20
        env:
          GSC_CREDENTIALS_JSON: ${{ secrets.GSC_CREDENTIALS_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GBP_ACCOUNT_ID: ${{ secrets.GBP_ACCOUNT_ID }}
          GBP_LOCATION_ID: ${{ secrets.GBP_LOCATION_ID }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GH_TOKEN: ${{ github.token }}
        run: python agent.py

      - name: Alert on failure
        if: steps.agent.outcome == 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="⚠️ SEO Agent failed on $(date +%Y-%m-%d). Check: https://github.com/13V/MK-Painting/actions" \
              -d parse_mode="Markdown" || true
          fi

      - name: Commit report and data
        if: always()
        run: |
          git checkout main
          git add reports/ data/ llm.txt sitemap.xml 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily SEO report $(date +%Y-%m-%d)"
            # Pull with rebase in case main moved during the run
            git pull --rebase origin main || true
            git push
          fi
